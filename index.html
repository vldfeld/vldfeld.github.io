<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Таймер Про: Drag & Drop</title>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: #000; color: #fff; margin: 0; 
            display: flex; height: 100vh; overflow: hidden;
        }
        
        .sidebar { width: 320px; background: #1c1c1e; border-right: 1px solid #333; display: flex; flex-direction: column; }
        .sidebar-header { padding: 25px 20px; border-bottom: 1px solid #333; font-weight: 900; color: #007bff; font-size: 18px; }
        .sidebar-content { flex: 1; overflow-y: auto; padding: 15px; }

        .archive-year { margin-bottom: 25px; color: #fff; font-weight: 900; }
        .archive-month { margin-left: 5px; border-left: 2px solid #007bff; padding-left: 15px; margin-top: 10px; }
        .month-title { font-weight: 800; color: #fff; text-transform: capitalize; display: block; margin-bottom: 5px; }
        .archive-day { padding: 10px 0; border-bottom: 1px solid #333; }
        .day-info { display: flex; justify-content: space-between; font-size: 13px; color: #fff; font-weight: 700; }

        .main-content { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .app-wrapper { width: 100%; max-width: 1000px; }

        .global-stats { 
            background: #1c1c1e; border-radius: 20px; padding: 20px; 
            margin-bottom: 25px; display: grid; grid-template-columns: 1fr 1fr; 
            gap: 20px; border: 1px solid #333; width: 100%;
        }
        .stat-item { text-align: center; }
        .stat-item span { display: block; font-size: 11px; color: #fff; text-transform: uppercase; margin-bottom: 5px; font-weight: 900; }
        .stat-item b { font-size: 22px; color: #007bff; font-family: monospace; }

        #container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; width: 100%; }
        
        /* Стили для перетаскивания */
        .card { 
            background: #1c1c1e; border-radius: 24px; padding: 20px; 
            border-top: 5px solid #007bff; position: relative; 
            transition: transform 0.2s, opacity 0.2s;
        }
        .card.dragging { opacity: 0.5; transform: scale(0.95); }
        .card.drag-over { border: 2px dashed #007bff; }
        .reorder-mode .card { cursor: move; border-style: dashed; opacity: 0.8; }

        .main-val { font-size: 34px; font-weight: 900; text-align: center; margin: 10px 0; font-family: monospace; color: #fff; }
        .sub-val { font-size: 18px; text-align: center; color: #00fbff; margin-bottom: 15px; font-family: monospace; font-weight: 800; }

        button { border: none; border-radius: 14px; font-weight: 900; cursor: pointer; color: #fff; }
        .btn-add { background: #007bff; padding: 10px 15px; font-size: 12px; }
        .btn-reorder { background: #5856d6; padding: 10px 15px; font-size: 12px; }
        .btn-reorder.active { background: #ff9500; }
        
        .btn-main { padding: 14px; font-size: 15px; width: 100%; margin-bottom: 5px; text-transform: uppercase; }
        .btn-small { padding: 10px; font-size: 20px; flex: 1; background: #333; }
        
        /* Numpad */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .numpad { background: #1c1c1e; padding: 25px; border-radius: 35px; width: 380px; border: 1px solid #444; }
        .numpad-display { background: #000; padding: 15px; border-radius: 20px; margin-bottom: 20px; text-align: right; min-height: 110px; display: flex; flex-direction: column; justify-content: center; border: 1px solid #333; }
        #calc-history { font-size: 14px; color: #888; font-family: monospace; min-height: 1.2em; margin-bottom: 4px; }
        #preview-sign { font-size: 28px; font-weight: 900; margin-right: 10px; }
        #num-display { font-size: 38px; font-family: monospace; color: #fff; font-weight: 900; }
        .numpad-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .num-btn { background: #2c2c2e; color: #fff; width: 62px; height: 62px; border-radius: 50%; font-size: 24px; display: flex; align-items: center; justify-content: center; font-weight: 700; transition: 0.2s; }
        .num-btn.active-plus { background: #007bff !important; }
        .num-btn.active-minus { background: #ff3b30 !important; }
        .unit-btn { background: none; color: #fff; font-size: 16px; text-align: left; height: 62px; display: flex; align-items: center; font-weight: 900; border:none; }
        .save-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 25px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">АРХИВ СЕССИЙ</div>
        <div class="sidebar-content" id="sidebar-content"></div>
    </aside>

    <main class="main-content">
        <div class="app-wrapper">
            <h1 style="text-align: center; margin-bottom: 25px; font-weight: 900; letter-spacing: -1px;">ТАЙМЕР</h1>
            <div class="global-stats">
                <div class="stat-item"><span>СЕГОДНЯ</span><b id="g-today-time">00:00:00</b> / <b id="g-today-count">0</b></div>
                <div class="stat-item"><span>ОБЩИЙ ИТОГ</span><b id="g-all-time">00:00:00</b> / <b id="g-all-count">0</b></div>
            </div>
            <div style="display:flex; gap: 10px; justify-content:center; margin-bottom: 30px; flex-wrap: wrap;">
                <button class="btn-add" onclick="addItem('timer')">+ ТАЙМЕР</button>
                <button class="btn-add" onclick="addItem('counter')">+ СЧЕТЧИК</button>
                <button class="btn-add" onclick="addItem('hybrid')">+ ГИБРИД</button>
                <button id="reorder-toggle" class="btn-reorder" onclick="toggleReorder()">ИЗМЕНИТЬ ПОРЯДОК</button>
            </div>
            <div id="container"></div>
        </div>
    </main>

    <div id="modal" class="modal">
        <div class="numpad">
            <div style="color:#fff; text-align:center; margin-bottom:15px; font-weight: 900; font-size: 14px;">КАЛЬКУЛЯТОР</div>
            <div class="numpad-display">
                <div id="calc-history"></div>
                <div style="display:flex; align-items:center; justify-content: flex-end;">
                    <span id="preview-sign"></span>
                    <span id="num-display">00:00:00</span>
                </div>
            </div>
            <div class="numpad-grid">
                <div class="num-btn" onclick="pressNum(7)">7</div><div class="num-btn" onclick="pressNum(8)">8</div><div class="num-btn" onclick="pressNum(9)">9</div><button class="unit-btn" onclick="applyUnit('d')">Дней</button>
                <div class="num-btn" onclick="pressNum(4)">4</div><div class="num-btn" onclick="pressNum(5)">5</div><div class="num-btn" onclick="pressNum(6)">6</div><button class="unit-btn" onclick="applyUnit('h')">Часов</button>
                <div class="num-btn" onclick="pressNum(1)">1</div><div class="num-btn" onclick="pressNum(2)">2</div><div class="num-btn" onclick="pressNum(3)">3</div><button class="unit-btn" onclick="applyUnit('m')">Минут</button>
                <div class="num-btn" id="op-plus" onclick="setOp(1)">+</div><div class="num-btn" onclick="pressNum(0)">0</div><div class="num-btn" id="op-minus" onclick="setOp(-1)">−</div><button class="unit-btn" onclick="applyUnit('s')">Сек</button>
            </div>
            <div class="save-btns">
                <button class="btn-main" style="background:#28a745; border-radius:18px;" onclick="saveNumpad(1)">ПЛЮС</button>
                <button class="btn-main" style="background:#dc3545; border-radius:18px;" onclick="saveNumpad(-1)">МИНУС</button>
            </div>
            <button class="btn-main" style="background:#333; margin-top:10px;" onclick="resetNumpad()">СБРОС</button>
            <button class="btn-main" style="background:none;" onclick="closeModal()">ОТМЕНА</button>
        </div>
    </div>

    <script>
        let items = JSON.parse(localStorage.getItem('timer_calc_v8') || '[]');
        let activeId = null;
        let isReorderMode = false;
        let currentRaw = "", currentOp = null, totalAccumulatedSeconds = 0, historyString = "";

        function saveData() {
            localStorage.setItem('timer_calc_v8', JSON.stringify(items.map(i => {
                const copy = {...i}; delete copy.interval; return copy;
            })));
            renderArchive();
        }

        function toggleReorder() {
            isReorderMode = !isReorderMode;
            const btn = document.getElementById('reorder-toggle');
            const container = document.getElementById('container');
            
            if (isReorderMode) {
                btn.innerText = "ГОТОВО";
                btn.classList.add('active');
                container.classList.add('reorder-mode');
            } else {
                btn.innerText = "ИЗМЕНИТЬ ПОРЯДОК";
                btn.classList.remove('active');
                container.classList.remove('reorder-mode');
            }
            render();
        }

        function addItem(type) {
            items.push({
                id: Date.now(), type, name: type.toUpperCase(),
                value: 0, subValue: 0, totalTime: 0, totalCount: 0, todayTime: 0, todayCount: 0,
                history: [], isRunning: false, color: '#007bff'
            });
            saveData(); render();
        }

        function formatTime(s) {
            const abs = Math.abs(s);
            const h = Math.floor(abs / 3600);
            const m = Math.floor((abs % 3600) / 60);
            const sec = abs % 60;
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }

        function updateCounter(id, delta) {
            if (isReorderMode) return;
            const item = items.find(i => i.id === id);
            item.value += delta;
            if (delta > 0) record(item, 0, delta);
            saveData(); render();
        }

        /* --- DRAG & DROP LOGIC --- */
        let draggedItemId = null;

        function handleDragStart(e, id) {
            if (!isReorderMode) return;
            draggedItemId = id;
            e.currentTarget.classList.add('dragging');
        }

        function handleDragEnd(e) {
            e.currentTarget.classList.remove('dragging');
            document.querySelectorAll('.card').forEach(c => c.classList.remove('drag-over'));
        }

        function handleDragOver(e) {
            if (!isReorderMode) return;
            e.preventDefault();
            e.currentTarget.classList.add('drag-over');
        }

        function handleDragLeave(e) {
            e.currentTarget.classList.remove('drag-over');
        }

        function handleDrop(e, targetId) {
            if (!isReorderMode || draggedItemId === targetId) return;
            
            const draggedIdx = items.findIndex(i => i.id === draggedItemId);
            const targetIdx = items.findIndex(i => i.id === targetId);
            
            const [removed] = items.splice(draggedIdx, 1);
            items.splice(targetIdx, 0, removed);
            
            saveData();
            render();
        }

        /* --- Остальные функции --- */
        function openNumpad(id) { activeId = id; resetNumpad(); document.getElementById('modal').classList.add('active'); }
        function closeModal() { document.getElementById('modal').classList.remove('active'); }
        function resetNumpad() { currentRaw = ""; currentOp = null; totalAccumulatedSeconds = 0; historyString = ""; updateNumpadUI(); }
        function setOp(op) { currentOp = op; updateNumpadUI(); }
        function pressNum(n) { currentRaw += n; updateNumpadUI(); }
        function applyUnit(unit) {
            if (currentOp === null) return;
            let val = parseInt(currentRaw || 0);
            let sec = (unit==='d')?val*86400:(unit==='h')?val*3600:(unit==='m')?val*60:val;
            totalAccumulatedSeconds += (sec * currentOp);
            currentRaw = ""; updateNumpadUI();
        }
        function updateNumpadUI() {
            document.getElementById('op-plus').className = "num-btn" + (currentOp === 1 ? " active-plus" : "");
            document.getElementById('op-minus').className = "num-btn" + (currentOp === -1 ? " active-minus" : "");
            document.getElementById('num-display').innerText = currentRaw || formatTime(totalAccumulatedSeconds);
        }

        function saveNumpad(dir) {
            const item = items.find(i => i.id === activeId);
            if (currentRaw !== "" && currentOp !== null) totalAccumulatedSeconds += (parseInt(currentRaw) * currentOp);
            const res = totalAccumulatedSeconds * dir;
            if (item.type === 'counter') item.value += res;
            else if (item.type === 'hybrid') item.subValue += res;
            else item.value += res;
            closeModal(); saveData(); render();
        }

        function toggleTimer(id) {
            if (isReorderMode) return;
            const item = items.find(i => i.id === id);
            if (item.isRunning) {
                clearInterval(item.interval); item.isRunning = false;
                const dTime = (item.type === 'hybrid' ? item.subValue : item.value) - item.sessionStart;
                if (dTime > 0) record(item, dTime, 0);
            } else {
                item.isRunning = true;
                item.sessionStart = (item.type === 'hybrid' ? item.subValue : item.value);
                item.interval = setInterval(() => {
                    if (item.type === 'hybrid') item.subValue++; else item.value++;
                    render();
                }, 1000);
            }
            saveData(); render();
        }

        function record(item, dt, dc) {
            const now = new Date();
            item.history.unshift({ ts: now.getTime(), dt, dc });
            item.totalTime += dt; item.todayTime += dt;
            item.totalCount += dc; item.todayCount += dc;
        }

        function renderArchive() {
            const content = document.getElementById('sidebar-content');
            content.innerHTML = '';
            const tree = {};
            items.forEach(it => it.history.forEach(s => {
                const d = new Date(s.ts), day = d.toLocaleDateString('ru'), m = d.toLocaleString('ru', { month: 'long' }), y = d.getFullYear();
                if (!tree[y]) tree[y] = {}; if (!tree[y][m]) tree[y][m] = { t: 0, c: 0, days: {} };
                if (!tree[y][m].days[day]) tree[y][m].days[day] = { t: 0, c: 0 };
                tree[y][m].t += s.dt; tree[y][m].days[day].t += s.dt;
            }));
            Object.keys(tree).sort((a,b)=>b-a).forEach(y => {
                let h = `<div class="archive-year">${y}`;
                for (let m in tree[y]) {
                    h += `<div class="archive-month"><span class="month-title">${m}</span>`;
                    for (let d in tree[y][m].days) h += `<div class="archive-day"><div class="day-info"><span>${d}</span><span style="color:#007bff">+${formatTime(tree[y][m].days[d].t)}</span></div></div>`;
                    h += `</div>`;
                }
                content.innerHTML += h + `</div>`;
            });
        }

        function render() {
            const container = document.getElementById('container'); container.innerHTML = '';
            let gtT = 0, gtC = 0, gaT = 0, gaC = 0;
            
            items.forEach(item => {
                gtT += item.todayTime; gtC += item.todayCount; gaT += item.totalTime; gaC += item.totalCount;
                
                const card = document.createElement('div');
                card.className = 'card';
                card.style.borderTopColor = item.color;
                
                // Атрибуты Drag & Drop
                if (isReorderMode) {
                    card.draggable = true;
                    card.ondragstart = (e) => handleDragStart(e, item.id);
                    card.ondragend = handleDragEnd;
                    card.ondragover = handleDragOver;
                    card.ondragleave = handleDragLeave;
                    card.ondrop = (e) => handleDrop(e, item.id);
                }

                let body = '';
                if (item.type === 'timer') {
                    body = `<div class="main-val">${formatTime(item.value)}</div><button class="btn-main" style="background:${item.isRunning ? '#ff3b30':'#007bff'}" onclick="toggleTimer(${item.id})">${item.isRunning ? 'ПАУЗА':'СТАРТ'}</button>`;
                } else if (item.type === 'counter') {
                    body = `<div class="main-val">${item.value}</div><div style="display:flex; gap:10px;"><button class="btn-small" onclick="updateCounter(${item.id}, 1)">+</button><button class="btn-small" onclick="updateCounter(${item.id}, -1)">-</button></div>`;
                } else {
                    body = `<div class="main-val">${item.value}</div><div class="sub-val">${formatTime(item.subValue)}</div>
                            <button class="btn-main" style="background:${item.isRunning ? '#ff3b30':'#007bff'}" onclick="toggleTimer(${item.id})">${item.isRunning ? 'ПАУЗА':'СТАРТ'}</button>
                            <div style="display:flex; gap:10px;"><button class="btn-small" onclick="updateCounter(${item.id}, 1)">+</button><button class="btn-small" onclick="updateCounter(${item.id}, -1)">-</button></div>`;
                }
                
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <input style="background:none; border:none; color:#fff; font-weight:900; outline:none; font-size:16px;" value="${item.name}" onchange="items.find(i=>i.id==${item.id}).name=this.value; saveData()">
                        <button style="background:none; color:#fff; font-size:22px;" onclick="openNumpad(${item.id})">⚙️</button>
                    </div>
                    ${body}
                    <div style="margin-top:20px; font-size:11px; color:#fff; display:flex; justify-content:space-between; font-weight:900;">
                        <span>TODAY: ${formatTime(item.todayTime)}</span>
                        <span style="color:#ff3b30; cursor:pointer" onclick="items=items.filter(i=>i.id!=${item.id}); render(); saveData()">УДАЛИТЬ</span>
                    </div>`;
                container.appendChild(card);
            });
            document.getElementById('g-today-time').innerText = formatTime(gtT); document.getElementById('g-today-count').innerText = gtC;
            document.getElementById('g-all-time').innerText = formatTime(gaT); document.getElementById('g-all-count').innerText = gaC;
        }
        render(); renderArchive();
    </script>
</body>
</html>
